name: CI

on:
  push:
    branches: [v*]
  pull_request:
    branches: [v*]
    types: [closed]

jobs:
  version-update:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref =~ /^v[0-9]+\.[0-9]+$/)
      || (github.event_name == 'push' && github.ref_name =~ /^v[0-9]+\.[0-9]+$/ && github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract version from branch
        id: extract-version
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH_NAME="${{ github.event.pull_request.base.ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi
          VERSION_BASE=${BRANCH_NAME#v}
          echo "VERSION_BASE=$VERSION_BASE" >> $GITHUB_ENV
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Get current version
        id: current-version
        run: |
          if [ -f VERSION ]; then
            CURRENT_VERSION=$(cat VERSION)
            echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          else
            echo "CURRENT_VERSION=0.0.0" >> $GITHUB_ENV
          fi

      - name: Calculate new patch version
        id: calculate-patch
        run: |
          CURRENT_PATCH=$(echo "${{ env.CURRENT_VERSION }}" | cut -d. -f3)
          if [ -z "$CURRENT_PATCH" ]; then
            CURRENT_PATCH=0
          fi
          NEW_PATCH=$((CURRENT_PATCH + 1))
          echo "NEW_PATCH=$NEW_PATCH" >> $GITHUB_ENV
          echo "NEW_VERSION=${{ env.VERSION_BASE }}.$NEW_PATCH" >> $GITHUB_ENV
          echo "New version will be: ${{ env.VERSION_BASE }}.$NEW_PATCH"

      - name: Update VERSION file
        run: |
          echo "${{ env.NEW_VERSION }}" > VERSION
          cat VERSION

      - name: Sync versions to all packages
        run: node scripts/version-sync.js

      - name: Commit and push version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION backend/package.json frontend/package.json kanban-cli/package.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ env.NEW_VERSION }}"
          git push

  build-and-test:
    runs-on: ubuntu-latest
    needs: []
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.merged != true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests (unit)
        run: npm run test:unit
