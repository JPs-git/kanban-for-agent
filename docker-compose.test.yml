version: "3.8"

services:
  # MongoDB 测试服务
  mongo:
    image: mongo:5.0
    container_name: kanban-mongo-test
    volumes:
      - mongo-data-test:/data/db
    networks:
      - kanban-network-test
    restart: always
    env_file:
      - .env.test
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban-backend-test
    env_file:
      - .env.test
    environment:
      NODE_ENV: test
      MONGODB_TEST_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongo:27017/kanban-test?authSource=admin
      PORT: 3000
    depends_on:
      - mongo
    networks:
      - kanban-network-test
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanban-frontend-test
    ports:
      - "8081:80"
    networks:
      - kanban-network-test
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  mongo-data-test:

networks:
  kanban-network-test:
    driver: bridge
