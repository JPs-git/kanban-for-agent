version: '3.8'

services:
  # MongoDB 服务
  mongo:
    image: mongo:5.0
    container_name: kanban-mongo-dev
    volumes:
      - mongo-data-dev:/data/db
    networks:
      - kanban-network-dev
    restart: always
    env_file:
      - .env.development
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban-backend-dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongo:27017/kanban?authSource=admin
      PORT: 3000
    depends_on:
      - mongo
    networks:
      - kanban-network-dev
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanban-frontend-dev
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - kanban-network-dev
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  mongo-data-dev:

networks:
  kanban-network-dev:
    driver: bridge