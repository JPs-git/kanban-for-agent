name: CI

on:
  push:
    branches: [v*, patch/*]
  pull_request:
    branches: [v*]
    types: [opened, synchronize]

jobs:
  version-update:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' && 
      contains(github.event.pull_request.base.ref, 'v') && 
      contains(github.event.pull_request.base.ref, '.') &&
      startsWith(github.head_ref, 'patch/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract version from base branch
        id: extract-version
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          VERSION_BASE=${BASE_BRANCH#v}
          echo "VERSION_BASE=$VERSION_BASE" >> $GITHUB_ENV
          echo "BASE_BRANCH=$BASE_BRANCH" >> $GITHUB_ENV
          echo "HEAD_REF=${{ github.head_ref }}" >> $GITHUB_ENV

      - name: Validate version branch format
        run: |
          if ! echo "${{ env.VERSION_BASE }}" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "Invalid version branch format: ${{ env.BASE_BRANCH }}"
            exit 1
          fi

      - name: Get current version or calculate next patch
        id: calculate-version
        run: |
          if [ -f VERSION ]; then
            CURRENT_VERSION=$(cat VERSION)
            CURRENT_PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
            if [ -z "$CURRENT_PATCH" ]; then
              CURRENT_PATCH=0
            fi
          else
            CURRENT_PATCH=0
          fi

          NEW_PATCH=$((CURRENT_PATCH + 1))
          NEW_VERSION="${{ env.VERSION_BASE }}.$NEW_PATCH"

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "New version will be: $NEW_VERSION"

      - name: Update VERSION file
        run: |
          echo "${{ env.NEW_VERSION }}" > VERSION
          cat VERSION

      - name: Sync versions to all packages
        run: node scripts/version-sync.js

      - name: Commit and push version changes to patch branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json backend/package.json frontend/package.json kanban-cli/package.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ env.NEW_VERSION }}"
          git push origin HEAD:${{ github.head_ref }}

  build-and-test:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests (unit)
        run: npm run test:unit
