name: CI

on:
  push:
    branches: [v*, patch/*]
  pull_request:
    branches: [v*]
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  version-update:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' && 
      contains(github.event.pull_request.base.ref, 'v') && 
      contains(github.event.pull_request.base.ref, '.') &&
      startsWith(github.head_ref, 'patch/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract version from base branch
        id: extract-version
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          VERSION_BASE=${BASE_BRANCH#v}
          echo "VERSION_BASE=$VERSION_BASE" >> $GITHUB_ENV
          echo "BASE_BRANCH=$BASE_BRANCH" >> $GITHUB_ENV
          echo "HEAD_REF=${{ github.head_ref }}" >> $GITHUB_ENV

      - name: Validate version branch format
        run: |
          if ! echo "${{ env.VERSION_BASE }}" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "Invalid version branch format: ${{ env.BASE_BRANCH }}"
            exit 1
          fi

      - name: Get base branch version (target version)
        id: get-base-version
        run: |
          BASE_VERSION=$(git show ${{ env.BASE_BRANCH }}:VERSION 2>/dev/null || echo "${{ env.VERSION_BASE }}.0")
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_ENV
          echo "Base branch ${{ env.BASE_BRANCH }} version: $BASE_VERSION"

      - name: Get current patch branch version
        id: get-current-version
        run: |
          if [ -f VERSION ]; then
            CURRENT_VERSION=$(cat VERSION)
          else
            CURRENT_VERSION="${{ env.VERSION_BASE }}.0"
          fi
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          echo "Current patch branch version: $CURRENT_VERSION"

      - name: Calculate next version and compare
        id: calculate-version
        run: |
          BASE_MAJOR=$(echo "${{ env.BASE_VERSION }}" | cut -d. -f1)
          BASE_MINOR=$(echo "${{ env.BASE_VERSION }}" | cut -d. -f2)
          BASE_PATCH=$(echo "${{ env.BASE_VERSION }}" | cut -d. -f3)

          if [ -z "$BASE_PATCH" ]; then
            BASE_PATCH=0
          fi

          EXPECTED_PATCH=$((BASE_PATCH + 1))
          EXPECTED_VERSION="${BASE_MAJOR}.${BASE_MINOR}.${EXPECTED_PATCH}"

          CURRENT_MAJOR=$(echo "${{ env.CURRENT_VERSION }}" | cut -d. -f1)
          CURRENT_MINOR=$(echo "${{ env.CURRENT_VERSION }}" | cut -d. -f2)
          CURRENT_PATCH=$(echo "${{ env.CURRENT_VERSION }}" | cut -d. -f3)

          if [ -z "$CURRENT_PATCH" ]; then
            CURRENT_PATCH=0
          fi

          echo "Expected version (base + 1): $EXPECTED_VERSION"
          echo "Current version: ${{ env.CURRENT_VERSION }}"

          if [ "$CURRENT_MAJOR" -eq "$BASE_MAJOR" ] && [ "$CURRENT_MINOR" -eq "$BASE_MINOR" ] && [ "$CURRENT_PATCH" -ge "$EXPECTED_PATCH" ]; then
            echo "Version ${{ env.CURRENT_VERSION }} is already >= expected $EXPECTED_VERSION. No update needed."
            echo "VERSION_NEEDS_UPDATE=false" >> $GITHUB_ENV
          else
            echo "Version needs update from ${{ env.CURRENT_VERSION }} to $EXPECTED_VERSION"
            echo "VERSION_NEEDS_UPDATE=true" >> $GITHUB_ENV
            echo "NEW_VERSION=$EXPECTED_VERSION" >> $GITHUB_ENV
          fi

      - name: Update VERSION file if needed
        if: env.VERSION_NEEDS_UPDATE == 'true'
        run: |
          echo "${{ env.NEW_VERSION }}" > VERSION
          echo "Updated VERSION to: ${{ env.NEW_VERSION }}"
          cat VERSION

      - name: Sync versions to all packages if needed
        if: env.VERSION_NEEDS_UPDATE == 'true'
        run: node scripts/version-sync.js

      - name: Commit and push version changes to patch branch if needed
        if: env.VERSION_NEEDS_UPDATE == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json backend/package.json frontend/package.json kanban-cli/package.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ env.NEW_VERSION }}"
          git push origin HEAD:${{ github.head_ref }}

  build-and-test:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests (unit)
        run: npm run test:unit
